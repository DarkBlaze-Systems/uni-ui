name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            engine/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Test (native)
        working-directory: engine
        run: cargo test --workspace
      - name: Test canvas backend
        working-directory: engine
        run: cargo test -p uni-render --features canvas
      - name: Wasm compile-check (pure crates)
        working-directory: engine
        run: |
          cargo build -p uni-ir -p uni-tokens -p uni-spring -p uni-env \
                      -p uni-dsl -p uni-reactor -p uni-shells -p slint-import \
                      --target wasm32-unknown-unknown

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            engine/target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
      - name: Format (check)
        working-directory: engine
        run: cargo fmt --all --check
      - name: Clippy (deny warnings)
        working-directory: engine
        run: cargo clippy --workspace --all-targets -- -D warnings

  docs:
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            engine/target
          key: ${{ runner.os }}-cargo-docs-${{ hashFiles('**/Cargo.lock') }}
      - name: Build docs (deny warnings)
        working-directory: engine
        run: cargo doc --workspace --no-deps
      - name: Doc tests
        working-directory: engine
        run: cargo test --doc --workspace

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: cargo-deny (licenses, advisories, bans)
        working-directory: engine
        run: cargo deny check licenses advisories bans
